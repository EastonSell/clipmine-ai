services:
  - type: web
    name: clipmine-ai-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    disk:
      name: clipmine-storage
      mountPath: /var/data/clipmine
      sizeGB: 10
    envVars:
      - key: PORT
        value: "8000"
      - key: STORAGE_DIR
        value: /var/data/clipmine/storage
      - key: STORAGE_BACKEND
        value: local
      - key: MODEL_CACHE_DIR
        value: /var/data/clipmine/models
      - key: WHISPER_MODEL_SIZE
        value: base
      - key: UPLOAD_PART_SIZE_MB
        value: "16"
      - key: UPLOAD_SESSION_TTL_MINUTES
        value: "120"
